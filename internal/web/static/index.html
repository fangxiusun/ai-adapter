<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai-adapter - LLM API Proxy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>`n    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body x-data="app()" x-init="init()">
    <div class="toast-container" id="toastContainer"></div>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">⚡</span>
            <span class="brand-text">ai-adapter</span>
        </div>
        <div class="sidebar-nav">
            <a :class="{'active': page === 'dashboard'}" @click.prevent="page='dashboard'" href="#">
                <span class="nav-icon">📊</span><span>仪表盘</span>
            </a>
            <a :class="{'active': page === 'channels'}" @click.prevent="page='channels'; loadChannels()" href="#">
                <span class="nav-icon">🔌</span><span>渠道</span>
            </a>
            <a :class="{'active': page === 'keys'}" @click.prevent="page='keys'; loadChannels()" href="#">
                <span class="nav-icon">🔑</span><span>Keys</span>
            </a>
            <a :class="{'active': page === 'logs'}" @click.prevent="page='logs'; loadLogs()" href="#">
                <span class="nav-icon">📋</span><span>日志</span>
            </a>
            <a :class="{'active': page === 'monitor'}" @click.prevent="page='monitor'; loadStatsHistory()" href="#">
                <span class="nav-icon">📈</span><span>监控</span>
            </a>
            <a :class="{'active': page === 'settings'}" @click.prevent="page='settings'; loadConfig()" href="#">
                <span class="nav-icon">⚙️</span><span>设置</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <div class="health-dot" :class="healthy ? 'dot-green' : 'dot-red'"></div>
            <span x-text="healthy ? '运行中' : '离线'"></span>
        </div>
    </nav>

    <main class="main">
        <!-- ========== Dashboard ========== -->
        <div x-show="page === 'dashboard'" x-cloak>
            <div class="page-header">
                <h1>仪表盘</h1>
                <button class="btn btn-ghost" @click="fetchStats()">🔄 刷新</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">🔌</div>
                    <div class="stat-body">
                        <div class="stat-value" x-text="stats.channels?.length || 0"></div>
                        <div class="stat-label">渠道</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔑</div>
                    <div class="stat-body">
                        <div class="stat-value" x-text="totalKeys"></div>
                        <div class="stat-label">Keys</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-body">
                        <div class="stat-value" x-text="stats.log_count || 0"></div>
                        <div class="stat-label">请求总数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" x-text="healthy ? '✅' : '❌'"></div>
                    <div class="stat-body">
                        <div class="stat-value" :class="healthy ? 'text-green' : 'text-red'" x-text="healthy ? '正常' : '异常'"></div>
                        <div class="stat-label">健康状态</div>
                    </div>
                </div>
            </div>

            <h2>渠道概览</h2>
            <div class="card-grid">
                <template x-for="ch in stats.channels || []" :key="ch.id">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title" x-text="ch.name"></span>
                            <span class="badge" :class="ch.enabled ? 'badge-green' : 'badge-red'" x-text="ch.enabled ? '启用' : '禁用'"></span>
                        </div>
                        <div class="card-body">
                            <div class="info-row"><span class="info-key">ID</span><span class="mono" x-text="ch.id"></span></div>
                            <div class="info-row"><span class="info-key">Keys</span><span x-text="ch.key_count"></span></div>
                            <div class="capability-row">
                                <span class="cap" :class="ch.chat_url ? 'cap-on' : 'cap-off'">Chat</span>
                                <span class="cap" :class="ch.responses_url ? 'cap-on' : 'cap-off'">Responses</span>
                                <span class="cap" :class="ch.messages_url ? 'cap-on' : 'cap-off'">Messages</span>
                                <span class="cap" :class="ch.generate_content_url ? 'cap-on' : 'cap-off'">Gemini</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- ========== Channels ========== -->
        <div x-show="page === 'channels'" x-cloak>
            <div class="page-header">
                <h1>渠道管理</h1>
                <button class="btn btn-ghost" @click="loadChannels()">🔄 刷新</button>
            </div>

            <template x-for="ch in channelsData" :key="ch.id">
                <div class="card card-full">
                    <div class="card-header">
                        <span class="card-title" x-text="ch.name"></span>
                        <div class="badge-group">
                            <span class="badge" :class="ch.enabled ? 'badge-green' : 'badge-red'" x-text="ch.enabled ? '启用' : '禁用'"></span>
                            <span class="badge badge-blue" x-text="ch.default_model"></span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="url-grid">
                            <div class="url-item">
                                <span class="url-label">Chat</span>
                                <span class="url-value" :class="ch.chat_url ? '' : 'text-muted'" x-text="ch.chat_url || '未配置'"></span>
                            </div>
                            <div class="url-item">
                                <span class="url-label">Responses</span>
                                <span class="url-value" :class="ch.responses_url ? '' : 'text-muted'" x-text="ch.responses_url || '未配置'"></span>
                            </div>
                            <div class="url-item">
                                <span class="url-label">Messages</span>
                                <span class="url-value" :class="ch.messages_url ? '' : 'text-muted'" x-text="ch.messages_url || '未配置'"></span>
                            </div>
                            <div class="url-item">
                                <span class="url-label">Gemini</span>
                                <span class="url-value" :class="ch.generate_content_url ? '' : 'text-muted'" x-text="ch.generate_content_url || '未配置'"></span>
                            </div>
                        </div>
                        <div class="models-section" x-show="ch.models && ch.models.length > 0">
                            <h3>模型</h3>
                            <div class="model-tags">
                                <template x-for="m in ch.models || []" :key="m.id">
                                    <span class="tag" x-text="m.display_name || m.id" :title="m.id"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- ========== Keys ========== -->
        <div x-show="page === 'keys'" x-cloak>
            <div class="page-header">
                <h1>Key 管理</h1>
                <button class="btn btn-ghost" @click="loadChannels()">🔄 刷新</button>
            </div>

            <template x-for="ch in channelsData" :key="ch.id">
                <div class="card card-full">
                    <div class="card-header">
                        <span class="card-title" x-text="ch.name + ' (' + ch.id + ')'"></span>
                        <span class="badge badge-blue" x-text="(ch.key_stats?.length || 0) + ' 个 Key'"></span>
                    </div>
                    <div class="card-body no-padding">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="checkbox-col"><input type="checkbox" x-model="selectAll" @change="toggleSelectAll(ch.id, ch.key_stats || [])"></th>
                                            <th>名称</th>
                                    <th>状态</th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'request_count')">请求 <span x-text="sortKey === ch.id+':request_count' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_count')">错误 <span x-text="sortKey === ch.id+':error_count' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_400')">400 <span x-text="sortKey === ch.id+':error_400' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_401')">401 <span x-text="sortKey === ch.id+':error_401' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_403')">403 <span x-text="sortKey === ch.id+':error_403' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_404')">404 <span x-text="sortKey === ch.id+':error_404' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_429')">429 <span x-text="sortKey === ch.id+':error_429' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_4xx')">4xx <span x-text="sortKey === ch.id+':error_4xx' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_5xx')">5xx <span x-text="sortKey === ch.id+':error_5xx' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_network')">网络 <span x-text="sortKey === ch.id+':error_network' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th class="sortable" @click="sortKeys(ch.id, 'error_stream')">流式 <span x-text="sortKey === ch.id+':error_stream' ? (sortDir === 'asc' ? '↑' : '↓') : ''"></span></th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="k in sortedKeyStats(ch.id, ch.key_stats) || []" :key="k.value || k.name">
                                    <tr>
                                        <td class="checkbox-col"><input type="checkbox" :value="k.value" x-model="selectedKeys[ch.id]"></td>
                                                <td><span class="mono" x-text="k.name || k.value"></span><br><span class="text-muted text-sm" x-text="k.value ? k.value.substring(0,8) + '***' : ''"></span></td>
                                        <td>
                                            <span class="badge" :class="k.paused ? 'badge-red' : 'badge-green'" x-text="k.paused ? '已暂停' : '活跃'"></span>
                                        </td>
                                        <td x-text="k.request_count || 0"></td>
                                        <td :class="(k.error_count || 0) > 0 ? 'text-red' : ''" x-text="k.error_count || 0"></td>
                                        <td :class="(k.error_400 || 0) > 0 ? 'text-yellow' : ''" x-text="k.error_400 || '-'"></td>
                                        <td :class="(k.error_401 || 0) > 0 ? 'text-red' : ''" x-text="k.error_401 || '-'"></td>
                                        <td :class="(k.error_403 || 0) > 0 ? 'text-yellow' : ''" x-text="k.error_403 || '-'"></td>
                                        <td :class="(k.error_404 || 0) > 0 ? 'text-yellow' : ''" x-text="k.error_404 || '-'"></td>
                                        <td :class="(k.error_429 || 0) > 0 ? 'text-yellow' : ''" x-text="k.error_429 || '-'"></td>
                                        <td :class="(k.error_4xx || 0) > 0 ? 'text-yellow' : ''" x-text="k.error_4xx || '-'"></td>
                                        <td :class="(k.error_5xx || 0) > 0 ? 'text-red' : ''" x-text="k.error_5xx || '-'"></td>
                                        <td :class="(k.error_network || 0) > 0 ? 'text-red' : ''" x-text="k.error_network || '-'"></td>
                                        <td :class="(k.error_stream || 0) > 0 ? 'text-red' : ''" x-text="k.error_stream || '-'"></td>
                                        <td>
                                            <button class="btn btn-sm" :class="k.paused ? 'btn-green' : 'btn-red'"
                                                    @click="toggleKey(ch.id, k.value, k.paused)"
                                                    x-text="k.paused ? '恢复' : '暂停'"></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>

        <!-- ========== Logs ========== -->
        <div x-show="page === 'logs'" x-cloak>
            <div class="page-header">
                <h1>请求日志</h1>
                <button class="btn btn-ghost" @click="loadLogs()">🔄 刷新</button>
            </div>

            <div class="filter-bar">
                <select x-model="logFilter.channel" @change="loadLogs()">
                    <option value="">所有渠道</option>
                    <template x-for="ch in channelsData" :key="ch.id">
                        <option :value="ch.id" x-text="ch.name"></option>
                    </template>
                </select>
                <select x-model="logFilter.status" @change="loadLogs()">
                    <option value="">所有状态</option>
                    <option value="2xx">2xx 成功</option>
                    <option value="4xx">4xx 客户端错误</option>
                    <option value="5xx">5xx 服务端错误</option>
                </select>
                <input type="number" x-model.number="logFilter.limit" placeholder="数量" min="1" max="500" style="width:80px" @change="loadLogs()">
                <button class="btn btn-primary" @click="loadLogs()">查询</button>
            </div>

            <div class="card card-full">
                <div class="card-body no-padding">
                    <table class="table table-logs">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>请求 ID</th>
                                <th>渠道</th>
                                <th>客户端模型</th>
                                <th>上游模型</th>
                                <th>状态</th>
                                <th>延迟</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="log in logs" :key="log.request_id">
                                <tr>
                                    <td class="mono text-sm" x-text="fmtTime(log.timestamp)" @click="toggleLogDetail(log.request_id)" style="cursor:pointer"></td>
                                    <td class="mono text-sm" x-text="log.request_id" @click="toggleLogDetail(log.request_id)" style="cursor:pointer"></td>
                                    <td x-text="log.channel_id" @click="toggleLogDetail(log.request_id)" style="cursor:pointer"></td>
                                    <td class="mono text-sm" x-text="log.model" @click="toggleLogDetail(log.request_id)" style="cursor:pointer"></td>
                                    <td @click="toggleLogDetail(log.request_id)" style="cursor:pointer">
                                        <span class="badge" :class="statusBadgeClass(log.status_code)" x-text="log.status_code"></span>
                                    </td>
                                    <td x-text="(log.latency_ms || 0) + 'ms'" @click="toggleLogDetail(log.request_id)" style="cursor:pointer"></td>
                                </tr>
                                <tr x-show="expandedLog === log.request_id && logDetail">
                                    <td colspan="6" class="log-detail-cell">
                                        <div class="log-detail">
                                            <div class="info-row"><span class="info-key">请求 ID</span><span class="mono" x-text="logDetail?.request_id"></span></div>
                                            <div class="info-row"><span class="info-key">上游模型</span><span class="mono" x-text="logDetail?.upstream_model || logDetail?.model"></span></div>
                                            <div class="info-row"><span class="info-key">Key</span><span class="mono" x-text="logDetail?.key_name || '-'"></span></div>
                                            <div class="info-row"><span class="info-key">Token 用量</span><span x-text="'Prompt ' + (logDetail?.prompt_tokens || 0).toLocaleString() + ' | Completion ' + (logDetail?.completion_tokens || 0).toLocaleString()"></span></div>
                                            <div class="info-row"><span class="info-key">总 Tokens</span><span x-text="(logDetail?.total_tokens || 0).toLocaleString()"></span></div>
                                            <div class="info-row"><span class="info-key">错误信息</span><span :class="logDetail?.error_message ? 'text-red' : ''" x-text="logDetail?.error_message || '-'"></span></div>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="logs.length === 0">
                                <td colspan="6" class="text-center text-muted">暂无日志</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ========== Monitor ========== -->
        <div x-show="page === 'monitor'" x-cloak>
            <div class="page-header">
                <h1>实时监控</h1>
                <span class="badge" :class="wsConnected ? 'badge-green' : 'badge-red'" x-text="wsConnected ? '已连接' : '未连接'"></span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-body">
                        <div class="stat-value" x-text="realtime.activeRequests"></div>
                        <div class="stat-label">活跃请求</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-body">
                        <div class="stat-value" x-text="realtime.qps.toFixed(1)"></div>
                        <div class="stat-label">QPS</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-body">
                        <div class="stat-value" x-text="realtime.avgLatency + 'ms'"></div>
                        <div class="stat-label">平均延迟</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">❌</div>
                    <div class="stat-body">
                        <div class="stat-value" :class="realtime.errorRate > 0.05 ? 'text-red' : ''" x-text="(realtime.errorRate * 100).toFixed(1) + '%'"></div>
                        <div class="stat-label">错误率</div>
                    </div>
                </div>
            </div>

            <div class="chart-grid">
                <div class="card">
                    <div class="card-header"><span class="card-title">请求趋势（最近 1 小时）</span></div>
                    <div class="card-body">
                        <canvas id="requestTrendChart" height="200"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">错误分布</span></div>
                    <div class="card-body">
                        <canvas id="errorDistChart" height="200"></canvas>
                    </div>
                </div>
            </div>

            <div class="card card-full">
                <div class="card-header"><span class="card-title">实时日志流</span></div>
                <div class="card-body no-padding">
                    <div class="live-log-container" id="liveLogContainer">
                        <template x-for="log in liveLogs" :key="log.request_id">
                            <div class="live-log-row">
                                <span class="mono text-sm" x-text="fmtTime(log.timestamp)"></span>
                                <span x-text="log.channel"></span>
                                <span class="mono text-sm" x-text="log.model"></span>
                                <span class="badge" :class="statusBadgeClass(log.status)" x-text="log.status"></span>
                                <span x-text="log.latency_ms + 'ms'"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== Settings ========== -->
        <div x-show="page === 'settings'" x-cloak>
            <div class="page-header">
                <h1>设置</h1>
                <button class="btn btn-ghost" @click="loadConfig()">🔄 刷新</button>
            </div>

            <div class="card card-full">
                <div class="card-header"><span class="card-title">服务器配置</span></div>
                <div class="card-body">
                    <div class="info-row"><span class="info-key">监听地址</span><span class="mono" x-text="configData.server?.host + ':' + configData.server?.port"></span></div>
                    <div class="info-row"><span class="info-key">API Token</span><span x-text="configData.server?.api_token ? '已设置' : '未设置（无认证）'"></span></div>
                </div>
            </div>
            <div class="card card-full">
                <div class="card-header"><span class="card-title">日志配置</span></div>
                <div class="card-body">
                    <div class="info-row"><span class="info-key">级别</span><span class="mono" x-text="configData.logging?.level"></span></div>
                    <div class="info-row"><span class="info-key">文件</span><span class="mono" x-text="configData.logging?.file || 'stdout'"></span></div>
                    <div class="info-row"><span class="info-key">记录请求体</span><span x-text="configData.logging?.log_request_body ? '是' : '否'"></span></div>
                    <div class="info-row"><span class="info-key">记录 IO</span><span x-text="configData.logging?.log_io ? '是' : '否'"></span></div>
                </div>
            </div>
            <div class="card card-full">
                <div class="card-header"><span class="card-title">渠道数</span></div>
                <div class="card-body">
                    <div class="info-row"><span class="info-key">已配置渠道</span><span x-text="configData.channels || 0"></span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
    function app() {
        return {
            page: 'dashboard',
            healthy: false,
            stats: {},
            channelsData: [],
            logs: [],
            configData: {},
            logFilter: { channel: '', status: '', limit: 50 },
            sortKey: '',
            sortDir: 'asc',

            // Realtime state
            wsConnected: false,
            realtime: { activeRequests: 0, qps: 0, avgLatency: 0, errorRate: 0 },
            liveLogs: [],
            requestTrendChart: null,
            errorDistChart: null,
            expandedLog: null,
            logDetail: null,
            selectedKeys: {},
            selectAll: false,

            get totalKeys() {
                let n = 0;
                for (const ch of this.stats.channels || []) n += ch.key_count || 0;
                return n;
            },

            async init() {
                await this.fetchStats();
                this.healthy = true;
                this.connectWebSocket();
            },

            connectWebSocket() {
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(protocol + '//' + location.host + '/admin/api/ws');
                ws.onopen = () => { this.wsConnected = true; };
                ws.onclose = () => {
                    this.wsConnected = false;
                    setTimeout(() => this.connectWebSocket(), 3000);
                };
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    this.handleWSMessage(msg);
                };
            },

            handleWSMessage(msg) {
                switch (msg.type) {
                    case 'heartbeat':
                        this.realtime.activeRequests = msg.data.active_requests;
                        break;
                    case 'log':
                        this.liveLogs.unshift(msg.data);
                        if (this.liveLogs.length > 20) this.liveLogs.pop();
                        break;
                    case 'metrics':
                        this.realtime.qps = msg.data.qps;
                        this.realtime.avgLatency = msg.data.avg_latency_ms;
                        this.realtime.errorRate = msg.data.error_rate;
                        break;
                    case 'key_event':
                        this.showToast(msg.data.channel + '/' + msg.data.key + ': ' + msg.data.event);
                        break;
                }
            },

            async loadStatsHistory() {
                try {
                    const r = await fetch('/admin/api/stats/history?minutes=60');
                    if (r.ok) {
                        const d = await r.json();
                        this.initCharts(d);
                    }
                } catch {}
            },

            initCharts(data) {
                if (this.requestTrendChart) this.requestTrendChart.destroy();
                if (this.errorDistChart) this.errorDistChart.destroy();

                const trendCtx = document.getElementById('requestTrendChart');
                if (trendCtx) {
                    this.requestTrendChart = new Chart(trendCtx, {
                        type: 'line',
                        data: {
                            labels: data.history.map(h => h.timestamp),
                            datasets: [
                                { label: '成功', data: data.history.map(h => h.success), borderColor: '#10B981', tension: 0.3 },
                                { label: '错误', data: data.history.map(h => h.errors), borderColor: '#EF4444', tension: 0.3 }
                            ]
                        },
                        options: { responsive: true, scales: { y: { beginAtZero: true } } }
                    });
                }

                const distCtx = document.getElementById('errorDistChart');
                if (distCtx) {
                    const colors = { '2xx': '#10B981', '400': '#F59E0B', '401': '#F97316', '429': '#EF4444', '4xx': '#8B5CF6', '5xx': '#DC2626' };
                    this.errorDistChart = new Chart(distCtx, {
                        type: 'doughnut',
                        data: {
                            labels: data.errors.map(e => e.status),
                            datasets: [{
                                data: data.errors.map(e => e.count),
                                backgroundColor: data.errors.map(e => colors[e.status] || '#6B7280')
                            }]
                        }
                    });
                }
            },

            async toggleLogDetail(requestId) {
                if (this.expandedLog === requestId) {
                    this.expandedLog = null;
                    this.logDetail = null;
                    return;
                }
                this.expandedLog = requestId;
                try {
                    const r = await fetch('/admin/api/logs/' + requestId);
                    if (r.ok) this.logDetail = await r.json();
                } catch {}
            },

            showToast(message) {
                const container = document.getElementById('toastContainer');
                if (!container) return;
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            toggleSelectAll(channelId, keys) {
                if (this.selectAll) {
                    this.selectedKeys[channelId] = (keys || []).map(k => k.value);
                } else {
                    this.selectedKeys[channelId] = [];
                }
            },

            async batchKeyAction(channelId, action) {
                const keys = this.selectedKeys[channelId] || [];
                if (keys.length === 0) return;
                if (action === 'delete' && !confirm('确认删除 ' + keys.length + ' 个 Key？')) return;
                try {
                    const r = await fetch('/admin/api/channels/' + channelId + '/keys/batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, keys })
                    });
                    if (r.ok) {
                        const d = await r.json();
                        this.showToast(action + ': 成功 ' + d.success + ', 失败 ' + d.failed);
                        this.selectedKeys[channelId] = [];
                        await this.loadChannels();
                    }
                } catch {}
            },

            async exportKeys(channelId) {
                window.open('/admin/api/channels/' + channelId + '/keys/export');
            },

            async importKeys(channelId) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.yaml,.yml';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const text = await file.text();
                    try {
                        const r = await fetch('/admin/api/channels/' + channelId + '/keys/import', {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/yaml' },
                            body: text
                        });
                        if (r.ok) {
                            const d = await r.json();
                            this.showToast('导入完成: 新增 ' + d.added + ', 跳过 ' + d.skipped);
                            await this.loadChannels();
                        }
                    } catch {}
                };
                input.click();
            },

            async fetchStats() {
                try {
                    const r = await fetch('/admin/api/stats');
                    if (r.ok) { this.stats = await r.json(); this.healthy = true; }
                    else this.healthy = false;
                } catch { this.healthy = false; }
            },

            async loadChannels() {
                try {
                    const r = await fetch('/admin/api/channels');
                    if (r.ok) {
                        const d = await r.json();
                        this.channelsData = d.channels || [];
                    }
                } catch {}
            },

            async loadLogs() {
                try {
                    let url = '/admin/api/logs?limit=' + (this.logFilter.limit || 50);
                    if (this.logFilter.channel) url += '&channel=' + this.logFilter.channel;
                    if (this.logFilter.status === '2xx') { url += '&statusMin=200&statusMax=299'; }
                    else if (this.logFilter.status === '4xx') { url += '&statusMin=400&statusMax=499'; }
                    else if (this.logFilter.status === '5xx') { url += '&statusMin=500&statusMax=599'; }
                    const r = await fetch(url);
                    if (r.ok) {
                        const d = await r.json();
                        this.logs = d.logs || [];
                    }
                } catch {}
            },

            async loadConfig() {
                try {
                    const r = await fetch('/admin/api/config');
                    if (r.ok) this.configData = await r.json();
                } catch {}
            },

            sortKeys(channelId, key) {
                if (this.sortKey === channelId + ':' + key) {
                    this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    this.sortKey = channelId + ':' + key;
                    this.sortDir = 'asc';
                }
            },

            sortedKeyStats(channelId, stats) {
                if (!stats || !stats.length) return [];
                const sk = channelId + ':' + this.sortKey.split(':')[1];
                const sortField = this.sortKey.split(':')[1];
                if (!sortField || this.sortKey.split(':')[0] !== channelId) return stats;
                const sorted = [...stats].sort((a, b) => {
                    const va = a[sortField] ?? 0;
                    const vb = b[sortField] ?? 0;
                    if (typeof va === 'number' && typeof vb === 'number') return this.sortDir === 'asc' ? va - vb : vb - va;
                    return this.sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
                });
                return sorted;
            },

            async toggleKey(channelId, keyVal, paused) {
                try {
                    const action = paused ? 'resume' : 'pause';
                    await fetch('/admin/api/channels/' + channelId + '/keys', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, key: keyVal })
                    });
                    await this.loadChannels();
                } catch {}
            },

            fmtTime(ts) {
                if (!ts) return '-';
                const d = new Date(ts < 1e12 ? ts * 1000 : ts);
                if (isNaN(d)) return ts;
                return d.toLocaleString('zh-CN', { hour12: false });
            },

            statusBadgeClass(s) {
                if (s >= 500) return 'badge-red';
                if (s >= 400) return 'badge-yellow';
                return 'badge-green';
            }
        };
    }
    </script>
</body>
</html>
