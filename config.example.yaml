server:
  host: "0.0.0.0"
  port: 8080
  api_token: ""
  # Maximum request body size in MB (default: 64). Requests larger than this will be truncated.
  # max_request_body_size_mb: 64

logging:
  level: "info"
  file: ""
  max_size_mb: 100
  max_backups: 3
  log_request_body: false
  log_io: false

database:
  path: "./data/proxy.db"


# Header Policy Configuration (optional)
# Controls how HTTP headers between client and upstream.
# Safety rules: Authorization, Cookie, X-Internal-* are always dropped in request phase.
# Match types: exact (default), wildcard (*), regex (~ prefix)
# headers:
#   request:
#     enabled: true
#     default_action: pass
#     drop: ["X-Debug-*", "~^x-internal-.*$"]  # wildcard and regex
#     set:
#       "X-Gateway-ID": "ai-adapter"
#     pass: ["X-Custom-Auth"]
#     rename:
#       "X-Old-Name": "X-New-Name"
#     append:
#       "X-Tags": "suffix"
#     prepend:
#       "X-Tags": "prefix"
#     copy:
#       "X-Source": "X-Target"
#   response:
#     enabled: true
#     drop: ["X-Upstream-*"]
# Proxy server definitions (optional). Channels reference these by proxy_id.
# Supported types: http, socks5
# proxies:
#   - id: "hk-proxy"
#     type: "http"
#     url: "http://proxy.example.com:8080"
#   - id: "us-socks"
#     type: "socks5"
#     url: "socks5://user:pass@socks.example.com:1080"

# Cross-channel failover configuration (optional)
# When enabled, if a channel fails with retryable errors (5xx, connection failure),
# the system automatically tries the next channel for the same model.
failover:
  enabled: false
  max_channel_attempts: 3       # Max channels to try per request
  total_timeout_ms: 120000      # Overall request timeout across all channels
  consecutive_fail_threshold: 2 # 5xx/connection failures before switching channel
  load_balance: "priority"      # priority | round-robin | random


# Multi-channel failover example:
# When multiple channels serve the same model, the system can automatically
# failover to the next channel on errors (5xx, connection failure, all keys exhausted).
#
# channels:
#   - id: "mimo-primary"
#     name: "MiMo Primary"
#     priority: 10              # Lower number = higher priority (default: 100)
#     chat_url: "https://primary.example.com"
#     models:
#       - id: "mimo-v2.5-pro"
#     keys:
#       - value: "sk-key-1"
#
#   - id: "mimo-backup"
#     name: "MiMo Backup"
#     priority: 20
#     chat_url: "https://backup.example.com"
#     models:
#       - id: "mimo-v2.5-pro"
#     keys:
#       - value: "sk-key-2"

channels:
  - id: "mimo"
    name: "MiMo"
    enabled: true
    # proxy_id: "hk-proxy" 
    # Interface capability URLs. Setting a URL means the channel natively supports that interface.
    # Base URLs must NOT include /v1 or /v1beta paths.
    # OpenAI Chat Completions
    chat_url: "https://token-plan-cn.xiaomimimo.com"
    # OpenAI Responses
    responses_url: "https://token-plan-cn.xiaomimimo.com"
    # Anthropic Messages
    messages_url: "https://token-plan-cn.xiaomimimo.com/anthropic"
    # Google Gemini Content 
    # generate_content_url: ""
    models:
      - id: "mimo-v2.5-pro"
        display_name: "MiMo V2.5 Pro"
        context_window: 1000000
        max_output_tokens: 131072
        supports_images: false
        supports_reasoning: true
      - id: "mimo-v2.5"
        display_name: "MiMo V2.5 (Vision)"
        context_window: 1000000
        supports_images: true
        supports_reasoning: true
    default_model: "mimo-v2.5-pro"
    keys:
      - value: "sk-your-mimo-key-here"
        name: "主 key"
    key_strategy: "round-robin"
    max_retries: 2
    retry_delay_ms: 500
    request_timeout_ms: 60000
    fanout:
      enabled: false
      count: 2
      wait_all: false
    thinking:
      default_enabled: true
      force_high_effort: false
    web_search:
      enabled: false
    retry:
      retry_delay_429_ms: 1000
      max_rotation_rounds: 3
      max_total_wait_ms: 30000
      consec_error_threshold: 3
      pause_multiplier_sec: 30
      pause_max_sec: 600
    key_stats_sync_sec: 60  # Key 统计持久化到数据库的间隔（秒），默认 60

    # Channel-level header policy (optional, overrides global)
    # request_headers:
    #   enabled: true
    #   drop: ["X-Channel-Debug-*"]
    #   set:
    #     "X-Channel-ID": "mimo"
    # response_headers:
    #   enabled: true
    #   drop: ["X-Upstream-*"]

  - id: "deepseek"
    name: "DeepSeek"
    enabled: true
    chat_url: "https://api.deepseek.com"
    models:
      - id: "deepseek-v4-pro"
        display_name: "DeepSeek V4 Pro"
        context_window: 1000000
        supports_reasoning: true
      - id: "deepseek-v4-flash"
        display_name: "DeepSeek V4 Flash"
        context_window: 1000000
        supports_reasoning: true
        aliases:
          - "deepseek-chat"
          - "deepseek-reasoner"
    default_model: "deepseek-v4-pro"
    keys:
      - value: "sk-your-deepseek-key-here"
        name: "主 key"
    key_strategy: "round-robin"
    max_retries: 2
    retry:
      retry_delay_429_ms: 1000
      max_rotation_rounds: 3
      max_total_wait_ms: 30000
      consec_error_threshold: 3
      pause_multiplier_sec: 30
      pause_max_sec: 600
